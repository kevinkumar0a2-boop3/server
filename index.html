<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Watch Ad</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* ── White timer bar (top) ─────────────────────────────────── */
    #timerBar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 999;
      background: #ffffff;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    #timerBar .label {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #timerBar .label span { color: #0088cc; }
    .bar-track {
      flex: 1;
      height: 6px;
      background: #e5e5ea;
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #0088cc, #34c759);
      transition: width .25s linear;
      width: 0%;
    }
    #timerNum {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #0088cc;
      min-width: 30px;
      text-align: right;
      flex-shrink: 0;
    }
    #adLabel {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: #888;
      flex-shrink: 0;
    }

    /* ── Ad iframe ─────────────────────────────────────────────── */
    body { background: #000; }
    #adFrame {
      position: fixed;
      top: 46px; /* below timer bar */
      left: 0; right: 0; bottom: 0;
      width: 100%;
      height: calc(100% - 46px);
      border: none;
      background: #000;
    }

    /* ── Fallback (iframe blocked) ─────────────────────────────── */
    #fallback {
      display: none;
      position: fixed;
      top: 46px; left: 0; right: 0; bottom: 0;
      background: #111;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px 24px;
      text-align: center;
    }
    #fallback p {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: rgba(255,255,255,.6);
      line-height: 1.5;
    }
    #fallback button {
      padding: 14px 28px;
      border: none;
      border-radius: 14px;
      background: #0088cc;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #fallback button:active { opacity: .85; }

    /* ── Verified overlay ──────────────────────────────────────── */
    #verifiedOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    #verifiedOverlay .ring {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: #34c759;
      display: flex; align-items: center; justify-content: center;
      animation: popIn .5s cubic-bezier(.175,.885,.32,1.275) forwards;
    }
    @keyframes popIn {
      0%   { transform: scale(0); opacity: 0; }
      70%  { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    #verifiedOverlay .ring svg { width: 40px; height: 40px; fill: #fff; }
    #verifiedOverlay p {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 20px; font-weight: 800; color: #34c759;
    }
    #verifiedOverlay small {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px; color: rgba(255,255,255,.45);
    }
  </style>
</head>
<body>

<!-- White timer bar at top -->
<div id="timerBar">
  <div class="label">Ad <span id="adNumLabel">1</span> of <span id="adTotalLabel">5</span></div>
  <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
  <div id="timerNum">30s</div>
  <div id="adLabel">⏳ watching...</div>
</div>

<!-- Ad iframe -->
<iframe id="adFrame" src="" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation"></iframe>

<!-- Fallback (shown if iframe is blocked) -->
<div id="fallback">
  <p>This ad must be opened in your browser.<br>Tap the button — the timer is already running!</p>
  <button id="fallbackBtn" onclick="openFallback()">📲 Open Ad</button>
</div>

<!-- Verified overlay -->
<div id="verifiedOverlay">
  <div class="ring"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
  <p>✅ Ad Verified!</p>
  <small>Returning to bot…</small>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // ── Parse params from startapp (base64url JSON) ─────────────────
  function b64decode(s) {
    s = s.replace(/-/g, '+').replace(/_/g, '/');
    while (s.length % 4) s += '=';
    return atob(s);
  }

  var params = {};
  try {
    var raw = (tg.initDataUnsafe && tg.initDataUnsafe.start_param) || '';
    if (!raw) {
      // fallback: URL query params (dev / direct access)
      var qs = new URLSearchParams(window.location.search);
      raw = qs.get('p') || '';
    }
    if (raw) params = JSON.parse(b64decode(raw));
  } catch(e) {}

  var adUrl   = params.u || '';
  var timer   = parseInt(params.s) || 30;
  var adIndex = parseInt(params.i) || 0;
  var adTotal = parseInt(params.n) || 5;
  var videoId = params.v || '';

  // Update labels
  document.getElementById('adNumLabel').textContent   = adIndex + 1;
  document.getElementById('adTotalLabel').textContent  = adTotal;
  document.getElementById('timerNum').textContent      = timer + 's';

  // ── Load ad in iframe ────────────────────────────────────────────
  var fallbackShown = false;
  var adFrame = document.getElementById('adFrame');

  if (adUrl) {
    adFrame.src = adUrl;

    // Detect iframe block after 3s
    var iframeTimeout = setTimeout(function() {
      try {
        // If contentDocument is null or throws, it's blocked
        if (!adFrame.contentDocument && !adFrame.contentWindow) {
          showFallback();
        }
      } catch(e) {
        showFallback();
      }
    }, 3000);

    adFrame.onload = function() { clearTimeout(iframeTimeout); };
    adFrame.onerror = function() { clearTimeout(iframeTimeout); showFallback(); };
  } else {
    showFallback();
  }

  function showFallback() {
    if (fallbackShown) return;
    fallbackShown = true;
    adFrame.style.display = 'none';
    var fb = document.getElementById('fallback');
    fb.style.display = 'flex';
  }

  function openFallback() {
    if (adUrl) tg.openLink(adUrl);
  }

  // ── Timer ────────────────────────────────────────────────────────
  var endTime  = Date.now() + timer * 1000;
  var barFill  = document.getElementById('barFill');
  var timerNum = document.getElementById('timerNum');
  var adLbl    = document.getElementById('adLabel');
  var done     = false;

  function tick() {
    if (done) return;
    var msLeft  = Math.max(0, endTime - Date.now());
    var secLeft = Math.ceil(msLeft / 1000);
    var pct     = ((timer - secLeft) / timer) * 100;

    timerNum.textContent = secLeft + 's';
    barFill.style.width  = pct + '%';

    if (secLeft <= 5 && secLeft > 0) {
      adLbl.textContent = '🔥 almost!';
    } else {
      adLbl.textContent = '⏳ watching...';
    }

    if (secLeft <= 0) {
      done = true;
      barFill.style.width = '100%';
      timerNum.textContent = '✅';
      adLbl.textContent = 'verified!';
      showVerified();
      return;
    }
    setTimeout(tick, 200);
  }
  tick();

  // ── Verified state ───────────────────────────────────────────────
  function showVerified() {
    var overlay = document.getElementById('verifiedOverlay');
    overlay.style.display = 'flex';
    // Close after 1.5s — server timer handles the actual bot-side verification
    setTimeout(function() { tg.close(); }, 1500);
  }

  // ── Back button ──────────────────────────────────────────────────
  tg.BackButton.show();
  tg.BackButton.onClick(function() {
    if (!done) {
      // Warn user timer is running
      if (confirm('Timer is still running. Leave anyway? Your progress will be lost.')) {
        tg.close();
      }
    } else {
      tg.close();
    }
  });
</script>
</body>
    </html>
